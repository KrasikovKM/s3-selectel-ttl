version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-s3ttl}
      MYSQL_USER: ${MYSQL_USER:-s3ttl}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-s3ttl}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-s3ttl}
      APP_PASSWORD: ${APP_PASSWORD:-Digital24!}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - internal
      - dokploy-network
    depends_on:
      - backend

volumes:
  mysql_data:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
