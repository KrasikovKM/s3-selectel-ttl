version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-s3ttl}
      MYSQL_USER: ${MYSQL_USER:-s3ttl}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-s3ttl}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-s3ttl}
      APP_PASSWORD: ${APP_PASSWORD:-Digital24!}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.s3ttl.rule=Host(`s3-ttl.alavenir.space`)"
      - "traefik.http.routers.s3ttl.entrypoints=websecure"
      - "traefik.http.routers.s3ttl.tls.certresolver=letsencrypt"
      - "traefik.http.services.s3ttl.loadbalancer.server.port=80"

volumes:
  mysql_data:

networks:
  default:
    name: dokploy-network
    external: true
