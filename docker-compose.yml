version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: s3ttl-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: s3ttl
      MYSQL_USER: s3ttl
      MYSQL_PASSWORD: s3ttl_pass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: s3ttl-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://s3ttl:s3ttl_pass@db:3306/s3ttl
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: s3ttl-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
